name: Build Ghidra Plugin

on:
  push:
    branches: [ main, 'api-*', 'feature/*', 'bugfix/*' ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      release_label:
        description: Optional release label for the generated zip files (for example v2.2.0)
        required: false
        type: string
      publish_release:
        description: Publish a GitHub release from this manual run
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up JDK 21
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Determine release metadata
      id: release_meta
      env:
        EVENT_NAME: ${{ github.event_name }}
        REF_TYPE: ${{ github.ref_type }}
        REF_NAME: ${{ github.ref_name }}
        DISPATCH_RELEASE_LABEL: ${{ inputs.release_label }}
        DISPATCH_PUBLISH_RELEASE: ${{ inputs.publish_release }}
      run: |
        if [[ "$REF_TYPE" == "tag" ]]; then
          release_label="$REF_NAME"
          publish_release="true"
        elif [[ "$EVENT_NAME" == "workflow_dispatch" && -n "$DISPATCH_RELEASE_LABEL" ]]; then
          release_label="$DISPATCH_RELEASE_LABEL"
          publish_release="$DISPATCH_PUBLISH_RELEASE"
        else
          release_label="${GITHUB_SHA::7}-$(date -u +%Y%m%d-%H%M%S)"
          publish_release="false"
        fi

        echo "release_label=$release_label" >> "$GITHUB_OUTPUT"
        echo "publish_release=$publish_release" >> "$GITHUB_OUTPUT"
        echo "artifact_name=GhydraMCP-$release_label" >> "$GITHUB_OUTPUT"

    - name: Build release archives
      run: ./scripts/build_release.sh --label "${{ steps.release_meta.outputs.release_label }}"
        
    - name: Upload nightly artifacts
      if: steps.release_meta.outputs.publish_release != 'true'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ steps.release_meta.outputs.artifact_name }}
        path: |
          target/GhydraMCP-*.zip
          target/GhydraMCP-*-SHA256SUMS.txt
          bridge_mcp_hydra.py
    
    - name: Generate Release Notes from CHANGELOG
      if: steps.release_meta.outputs.publish_release == 'true'
      id: generate_notes
      run: |
        VERSION="${{ steps.release_meta.outputs.release_label }}"
        VERSION="${VERSION#v}"
        
        awk -v version="$VERSION" '
          BEGIN { print_section=0; }
          $0 ~ "^## \\[" version "\\]" { print_section=1; next }
          $0 ~ "^## \\[" && print_section { print_section=0; next }
          print_section
        ' CHANGELOG.md > release_notes.md

        if [[ ! -s release_notes.md ]]; then
          printf 'Build artifacts for %s.\n\nSee CHANGELOG.md for the full release history.\n' "$VERSION" > release_notes.md
        fi
        
        echo "RELEASE_NOTES_FILE=release_notes.md" >> $GITHUB_OUTPUT

    - name: Create Release
      if: steps.release_meta.outputs.publish_release == 'true'
      id: create_release
      uses: softprops/action-gh-release@v1
      with:
        name: Release ${{ steps.release_meta.outputs.release_label }}
        body_path: ${{ steps.generate_notes.outputs.RELEASE_NOTES_FILE }}
        tag_name: ${{ steps.release_meta.outputs.release_label }}
        files: |
          target/GhydraMCP-*.zip
          target/GhydraMCP-*-SHA256SUMS.txt
          bridge_mcp_hydra.py
        draft: false
        prerelease: false
